name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install requirements
        run: uv sync --locked --all-extras --dev

      - name: Analyse code with pylint
        run: uv run pylint -j 0 app tests

      - name: Run unit tests
        run: uv run pytest tests/unit_tests

  notify:
    if: always()
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Update pull request with CI result
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          CI_RESULT: ${{ needs.quality.result }}
        with:
          script: |
            const marker = '<!-- ci-result -->';
            const result = process.env.CI_RESULT;
            const icon = result === 'success' ? '✅' : '❌';
            const body = `${marker}
            ${icon} CI ${result} for commit \`${context.sha.slice(0, 7)}\`.

            Workflow run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.user.type === 'Bot' && comment.body && comment.body.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
