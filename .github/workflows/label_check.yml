name: PR Label Check

on:
  pull_request:
    types: [opened, edited, labeled, unlabeled, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-check:
    runs-on: ubuntu-latest

    steps:
      - name: Validate label and comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- label-check -->';
            const requiredLabels = ['enhancement', 'bug', 'chore', 'documentation'];

            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);

            const hasRequired = requiredLabels.some(label => labels.includes(label));

            const icon = hasRequired ? '✅' : '❌';

            const body = `${marker}
            ${icon} Label check: ${
              hasRequired
                ? 'Valid type label present.'
                : `Missing type label. Add one of: ${requiredLabels.join(', ')}`
            }`;

            const issue_number = pr.number;
            const { owner, repo } = context.repo;

            // Get existing comments
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.user.type === 'Bot' && comment.body && comment.body.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

            // ❌ Fail the check if label missing (blocks merge if required)
            if (!hasRequired) {
              core.setFailed(`Missing required label. საჭიროა one of: ${requiredLabels.join(', ')}`);
            }
